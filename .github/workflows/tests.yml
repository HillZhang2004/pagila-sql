name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build containers
        run: docker compose up -d --build

      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if docker compose exec -T pg pg_isready -U postgres; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run tests
        run: docker compose exec -T pg ./run_tests.sh
